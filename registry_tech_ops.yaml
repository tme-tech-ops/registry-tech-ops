tosca_definitions_version: dell_1_1

description: >
  This blueprint Deploys a Harbor registry on an existing edge-cloud-init deployment

imports:
  - dell/types/types.yaml
  - tech-ops/definitions.yaml
  - tech-ops/inputs.yaml
  - tech-ops/outputs.yaml

input_groups:

  registry_config:
    display_label: Registry Configuration
    collapsible: true
    index: 1
    inputs:
      - harbor_version
      - harbor_port
      - harbor_username
      - harbor_password
      - docker_bridge_cidr
      - projects
      - debug

  env_config:
    display_label: Enironment Configuration
    collapsible: true
    index: 2
    inputs:
      - run_arg
      - script_url
      - offline_mode
      - offline_binary_secret
      - upload_package
      - upload_binary_secret
      - hide_log_output

  certificate_config:
    display_label: Self-Signed Certificates
    collapsible: true
    index: 3
    inputs:
     - duration_days
     - common_name
     - country
     - state
     - location
     - organization

labels:
  csys-obj-type:
    values:
      - environment
  target_environment:
    values:
      - ned
  vendor:
    values:
      - tme-tech-ops
  solution:
    values:
      - registry-tech-ops
  version:
    values:
      - "4.1.0.0"

blueprint_labels:
  env:
    values:
      - NED