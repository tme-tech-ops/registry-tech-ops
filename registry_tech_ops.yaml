tosca_definitions_version: dell_1_1

description: >
  This blueprint Deploys an NGINX server to serve static files on an existing POC VM deployment

imports:
  - dell/types/types.yaml
  - tech-ops/definitions.yaml
  - tech-ops/inputs.yaml
  - tech-ops/outputs.yaml

input_groups:
  deployment_target:
    display_label: Deployment Target
    collapsible: false
    index: 0
    inputs:
      - vm_deployment_id 

  registry_config:
    display_label: Registry Configuration
    collapsible: false
    index: 1
    inputs:
      - harbor_version
      - harbor_port
      - harbor_username
      - harbor_password
      - docker_bridge_cidr
      - projects
      - debug

  certificate_config:
    display_label: Self-Signed Certificates
    collapsible: true
    index: 2
    inputs:
     - duration_days
     - common_name
     - country
     - state
     - location
     - organization

  env_config:
    display_label: Enironment Configuration
    collapsible: false
    index: 2
    inputs:
      - script_url
      - offline_mode
      - offline_binary_secret

labels:
  csys-obj-type:
    values:
      - environment
  target_environment:
    values:
      - ned
  vendor:
    values:
      - tme-tech-ops
  solution:
    values:
      - registry-tech-ops
  version:
    values:
      - "4.1.0.0"

blueprint_labels:
  env:
    values:
      - NED